<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
    
    /* LIGHT MODE DEFAULT */
body.light {
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    color: #333;
}

body.light .header,
body.light .stat-card,
body.light .map-container,
body.light .info-panel {
    background: rgba(255,255,255,0.9);
    color: #333;
}

body.light .stat-value {
    color: #333;
}

/* DARK MODE */
body.dark {
    background: linear-gradient(135deg, #1e1e2f 0%, #121212 100%);
}

body.dark .header,
body.dark .stat-card,
body.dark .map-container,
body.dark .info-panel {
    background: rgba(30, 30, 30, 0.9);
}

body.dark .stat-value {
    color: #4ade80;
}

body {
    transition: background 0.4s ease;
}

.header,
.stat-card,
.map-container,
.info-panel {
    transition: background 0.4s ease, color 0.4s ease;
}
    
    
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .status {
            font-size: 14px;
            color: #4ade80;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin-top: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }

        .stat-unit {
            font-size: 14px;
            opacity: 0.7;
            margin-left: 3px;
        }

        .map-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #map {
            height: 400px;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .info-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            opacity: 0.8;
            font-size: 14px;
        }

        .info-value {
            font-weight: bold;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 22px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            #map {
                height: 300px;
            }

            .stat-value {
                font-size: 20px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 5px;
            }

            .header {
                padding: 15px;
            }

            .header h1 {
                font-size: 18px;
            }

            .stats-grid {
                gap: 10px;
            }

            .stat-card {
                padding: 15px;
            }

            .stat-icon {
                font-size: 24px;
            }

            .stat-value {
                font-size: 18px;
            }
        }

        .loading {
            text-align: center;
            padding: 20px;
            opacity: 0.7;
        }
    </style>
   
</head>
<body>
    <div class="container">
        <div class="header">
    <h1>
        <span>🚀</span>
        <span>GPS Tracker</span>
    </h1>

    <div style="display:flex; justify-content:center; margin-top:10px;">
        <button id="theme-toggle" 
            style="padding:8px 15px; border:none; border-radius:20px; cursor:pointer;">
            🌙 Dark Mode
        </button>
    </div>

    <div class="status">
        <div class="status-dot"></div>
        <span id="connection-status">Connecting...</span>
    </div>
</div>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">🌍</div>
                <div class="stat-label">Latitude</div>
                <div class="stat-value" id="lat">--</div>
            </div>

            <div class="stat-card">
                <div class="stat-icon">📍</div>
                <div class="stat-label">Longitude</div>
                <div class="stat-value" id="lng">--</div>
            </div>

            <div class="stat-card">
                <div class="stat-icon">🛰️</div>
                <div class="stat-label">Satellites</div>
                <div class="stat-value" id="sat">--</div>
            </div>

<div class="stat-card">
    <div class="stat-icon">📏</div>
    <div class="stat-label">Distance</div>
    <div class="stat-value" id="distance">0 km</div>
</div>
            <div class="stat-card">
                <div class="stat-icon">⚡</div>
                <div class="stat-label">Speed</div>
                <div class="stat-value">
                    <span id="speed">--</span>
                    <span class="stat-unit">km/h</span>
                </div>
                
            </div>
        </div>

        <div class="map-container">
            <div id="map"></div>
        </div>

        <div class="info-panel">
            <div class="info-row">
                <span class="info-label">📡 Last Update:</span>
                <span class="info-value" id="last-update">--</span>
            </div>
            <div class="info-row">
                <span class="info-label">🧭 Direction:</span>
                <span class="info-value" id="direction">--</span>
            </div>
            <div class="info-row">
                <span class="info-label">📏 Altitude:</span>
                <span class="info-value" id="altitude">-- m</span>
            </div>
            <div class="info-row">
                <span class="info-label">🎯 Accuracy:</span>
                <span class="info-value" id="accuracy">--</span>
            </div>
    </div>

<script>

// ===== GITHUB RAW FILE URL =====
    const GITHUB_URL = "https://cdn.jsdelivr.net/gh/loinux/GPS-Tracker/gps.json";

// ===== MAP INIT =====
const map = L.map('map').setView([28.6139, 77.2090], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19
}).addTo(map);

const vehicleIcon = L.divIcon({
    html: '<div style="font-size: 30px;">🚗</div>',
    iconSize: [40, 40],
    iconAnchor: [20, 20]
});

let marker = null;
let polyline = null;
let startMarker = null;
let endMarker = null;
let pathCoordinates = [];

// ===== FETCH FROM GITHUB =====
async function fetchGPS() {
    try {
        const response = await fetch(GITHUB_URL + "?t=" + new Date().getTime());
        const data = await response.json();

        document.getElementById('connection-status').textContent = 'Connected';

        // If single object
        if (!Array.isArray(data)) {

            updateDashboard(data);

            pathCoordinates.push([data.lat, data.lng]);

            drawRoute(pathCoordinates);
            return;
        }

        // If array
        if (data.length === 0) return;

        pathCoordinates = data.map(p => [p.lat, p.lng]);

        const last = data[data.length - 1];

        updateDashboard(last);
        drawRoute(pathCoordinates);

    } catch (error) {
        console.error("Fetch error:", error);
        document.getElementById('connection-status').textContent = 'Connection Error';
    }
}

setInterval(fetchGPS, 15000);
fetchGPS();

// ===== UPDATE DASHBOARD =====
function updateDashboard(data) {

    document.getElementById('lat').textContent =
        data.lat ? data.lat.toFixed(6) : '--';

    document.getElementById('lng').textContent =
        data.lng ? data.lng.toFixed(6) : '--';

    document.getElementById('sat').textContent =
        data.sat || '--';

    document.getElementById('speed').textContent =
        data.speed ? data.speed.toFixed(1) : '--';

    document.getElementById('last-update').textContent =
        new Date().toLocaleTimeString();

    if (data.lat && data.lng) {

        const latlng = [data.lat, data.lng];

        if (marker) {
            marker.setLatLng(latlng);
        } else {
            marker = L.marker(latlng, { icon: vehicleIcon }).addTo(map);
            map.setView(latlng, 16);
        }
    }
}

// ===== DRAW ROUTE =====
function drawRoute(coords) {

    if (coords.length < 2) return;

    if (polyline) {
        polyline.setLatLngs(coords);
    } else {
        polyline = L.polyline(coords, {
            color: '#4ade80',
            weight: 4,
            opacity: 0.8
        }).addTo(map);
    }

    // START marker
    if (!startMarker) {
        startMarker = L.marker(coords[0]).addTo(map)
            .bindPopup("Start Point");
    } else {
        startMarker.setLatLng(coords[0]);
    }

    // END marker
    if (!endMarker) {
        endMarker = L.marker(coords[coords.length - 1]).addTo(map)
            .bindPopup("Current Location");
    } else {
        endMarker.setLatLng(coords[coords.length - 1]);
    }

    calculateDistance(coords);
}

// ===== DISTANCE CALCULATION =====
function calculateDistance(coords) {

    let totalDistance = 0;

    for (let i = 1; i < coords.length; i++) {
        const from = L.latLng(coords[i - 1]);
        const to   = L.latLng(coords[i]);
        totalDistance += from.distanceTo(to);
    }

    totalDistance = totalDistance / 1000;

    document.getElementById("distance").textContent =
        totalDistance.toFixed(2) + " km";
}

// ===== THEME TOGGLE =====
const toggleBtn = document.getElementById("theme-toggle");
document.body.classList.add("dark");

toggleBtn.addEventListener("click", () => {

    if (document.body.classList.contains("dark")) {
        document.body.classList.remove("dark");
        document.body.classList.add("light");
        toggleBtn.innerHTML = "🌙 Dark Mode";
    } else {
        document.body.classList.remove("light");
        document.body.classList.add("dark");
        toggleBtn.innerHTML = "☀️ Light Mode";
    }
});

</script>
